name: Build and Deploy

env:
  PLUGIN_NAME: response-reference

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        platform:
          - linux-amd64
          - android-arm64
          - android-arm
          - darwin-amd64
          - darwin-arm64
          - windows-amd64

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.24'
          cache: true

      - name: Parse platform
        id: parse
        run: |
          PLATFORM="${{ matrix.platform }}"
          GOOS=${PLATFORM%%-*}
          GOARCH=${PLATFORM#*-}

          # Android/Termux runs Linux binaries; GOOS=android requires CGO
          if [ "$GOOS" = "android" ]; then
            GOOS=linux
          fi

          echo "goos=$GOOS" >> $GITHUB_OUTPUT
          echo "goarch=$GOARCH" >> $GITHUB_OUTPUT

      - name: Build
        run: |
          mkdir -p "bin/${{ matrix.platform }}"
          OUTPUT="bin/${{ matrix.platform }}/${{ env.PLUGIN_NAME }}"
          if [ "${{ steps.parse.outputs.goos }}" = "windows" ]; then
            OUTPUT="${OUTPUT}.exe"
          fi
          GOOS=${{ steps.parse.outputs.goos }} \
          GOARCH=${{ steps.parse.outputs.goarch }} \
          CGO_ENABLED=0 \
            go build -o "$OUTPUT" .

      - name: Determine version
        id: version
        run: |
          echo "version=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Authenticate
        id: auth
        run: |
          RESPONSE=$(curl -s -X POST \
            -H "Content-Type: application/json" \
            -d '{"email":"${{ secrets.HUB_EMAIL }}","password":"${{ secrets.HUB_PASSWORD }}"}' \
            '${{ secrets.HUB_LOGIN_URL }}')

          TOKEN=$(echo "$RESPONSE" | jq -r '.token')

          if [ "$TOKEN" = "null" ] || [ -z "$TOKEN" ]; then
            echo "Failed to obtain token. Response: $RESPONSE"
            exit 1
          fi

          echo "token=$TOKEN" >> $GITHUB_OUTPUT

      - name: Upload artifact
        run: |
          FILE="bin/${{ matrix.platform }}/${{ env.PLUGIN_NAME }}"
          if [ "${{ steps.parse.outputs.goos }}" = "windows" ]; then
            FILE="${FILE}.exe"
          fi

          if [ ! -f "$FILE" ]; then
            echo "Error: Binary not found at $FILE"
            exit 1
          fi

          echo "Binary: $FILE ($(stat -c%s "$FILE") bytes)"
          echo "Version: ${{ steps.version.outputs.version }}"
          echo "Platform: ${{ matrix.platform }}"
          echo "Plugin ID: ${{ secrets.HUB_PLUGIN_ID }}"

          response=$(curl -s -S -w "\n%{http_code}" -X POST \
            -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            -F "plugin_id=${{ secrets.HUB_PLUGIN_ID }}" \
            -F "version=${{ steps.version.outputs.version }}" \
            -F "platform=${{ matrix.platform }}" \
            -F "file=@$FILE" \
            '${{ secrets.HUB_UPLOAD_URL }}')

          http_code=$(echo "$response" | tail -n 1)
          body=$(echo "$response" | sed '$d')

          echo "HTTP Status: $http_code"
          echo "Response Body: $body"

          if [[ "$http_code" =~ ^2[0-9]{2}$ ]]; then
            echo "✓ Upload reported success for ${{ matrix.platform }} (HTTP $http_code)"
          else
            echo "✗ Upload failed for ${{ matrix.platform }} (HTTP $http_code)"
            exit 1
          fi

      - name: Verify upload
        run: |
          echo "Fetching releases to verify upload..."
          verify_response=$(curl -s -H "Authorization: Bearer ${{ steps.auth.outputs.token }}" \
            "${{ secrets.HUB_BASE_URL }}/plugins/${{ secrets.HUB_PLUGIN_ID }}/releases")
          echo "Releases response: $verify_response"

          version="${{ steps.version.outputs.version }}"
          platform="${{ matrix.platform }}"

          match=$(echo "$verify_response" | jq -r --arg v "$version" --arg p "$platform" '.[] | select(.version == $v and .platform == $p) | .id')
          if [ -n "$match" ] && [ "$match" != "null" ]; then
            echo "✓ Verified release exists for version=$version platform=$platform (id=$match)"
          else
            echo "✗ Verification failed: release not found for version=$version platform=$platform"
            exit 1
          fi
